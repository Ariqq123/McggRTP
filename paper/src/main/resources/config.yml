# McggRTP Paper config
# Notes:
# - This backend plugin talks to the Velocity plugin over the fixed plugin
#   message channel `mcggrtp:main`. That channel is registered by the plugin
#   in code; you do not create it manually here.
# - `network.current-server` must match the server id used on Velocity for this
#   backend, for example `server-1` or `server-2`.
# - On startup and `/rtp reload`, McggRTP merges any newly added default keys
#   into this file without overwriting your existing values.

debug:
  # Enables verbose McggRTP logs for GUI, proxy messaging, and RTP flow.
  enabled: false

gui:
  title: "&8Random Teleport"
  size: 27
  filler:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    name: " "

main-menu:
  overworld:
    slot: 11
    display-name: "&aOverworld"
    material: GRASS_BLOCK
    world-name: world
    permission: "mcggrtp.dimension.overworld"
    warmup-seconds: 5
    lore:
      - "&7Click to choose an overworld server."
  nether:
    slot: 13
    display-name: "&cNether"
    material: NETHERRACK
    world-name: world_nether
    permission: "mcggrtp.dimension.nether"
    warmup-seconds: 5
    lore:
      - "&7Click to choose a nether server."
      - "&cDangerous dimension."
  end:
    slot: 15
    display-name: "&dThe End"
    material: END_STONE
    world-name: world_the_end
    permission: "mcggrtp.dimension.end"
    warmup-seconds: 5
    lore:
      - "&7Click to choose an end server."

server-menu:
  title: "&8Choose Server: {dimension}"
  size: 27
  online-material: LIME_WOOL
  offline-material: BARRIER

sounds:
  menu-open: BLOCK_NOTE_BLOCK_PLING
  menu-click: BLOCK_NOTE_BLOCK_PLING
  denied: ENTITY_VILLAGER_NO
  teleport-success: ENTITY_ENDERMAN_TELEPORT

network:
  # Must match the server name configured on Velocity for this backend.
  current-server: "server-1"
  server-permission-prefix: "mcggrtp.server."
  # Keep the default network small. Add more servers here and in Velocity when
  # your network actually has them.
  dimensions:
    overworld:
      servers: [ "server-1", "server-2" ]
    nether:
      servers: [ "server-1" ]
    end:
      servers: [ "server-1" ]
  servers:
    server-1:
      display-name: "&aServer 1"
    server-2:
      display-name: "&aServer 2"
  # If a server entry omits `permission`, McggRTP derives it as:
  # `<server-permission-prefix><server-id>`
  # Example: with `server-permission-prefix: "mcgg.server."`,
  # `skyblock321` becomes `mcgg.server.skyblock321`

rtp:
  cooldown-seconds: 300
  # Limits how many RTP searches/chunk loads can run at the same time on this
  # backend. Extra RTP requests wait in a small in-memory queue. Start modestly;
  # increase only after watching TPS/MSPT under real load.
  max-concurrent-searches: 4
  adaptive-throttle:
    # Dynamically reduces concurrent RTP searches when the backend is under
    # load, then restores capacity gradually when TPS/MSPT recover.
    enabled: true
    min-concurrent-searches: 1
    min-tps: 18.5
    max-mspt: 80.0
    # Adds a tiny gap before starting the next queued RTP job. This smooths
    # chunk task spikes during mass RTP events.
    queue-start-delay-ticks: 2
    # Debug metrics are logged after this many completed RTP jobs.
    metrics-log-interval: 25
  location-pool:
    # Precomputes safe RTP destinations gradually so player requests can use a
    # ready location before falling back to a live search.
    enabled: true
    target-size: 4
    refill-interval-ticks: 200
    max-refill-attempts: 4
    # Keep false for production safety: the pool will reuse already-generated
    # chunks and will not create new terrain in the background.
    allow-generate-new-chunks: false
  worlds:
    world:
      enabled: true
      center-x: 0
      center-z: 0
      min-radius: 500
      max-radius: 5000
      max-attempts: 32
      blacklisted-biomes:
        - OCEAN
        - DEEP_OCEAN
      unsafe-blocks:
        - LAVA
        - FIRE
        - CACTUS
        - MAGMA_BLOCK
    world_nether:
      enabled: true
      center-x: 0
      center-z: 0
      min-radius: 250
      max-radius: 3000
      max-attempts: 64
      avoid-bedrock-roof: true
      unsafe-blocks:
        - LAVA
        - FIRE
        - MAGMA_BLOCK
    world_the_end:
      enabled: true
      center-x: 0
      center-z: 0
      min-radius: 500
      max-radius: 5000
      max-attempts: 48
