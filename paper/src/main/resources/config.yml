# McggRTP Paper config
# Notes:
# - This backend plugin talks to the Velocity plugin over the fixed plugin
#   message channel `mcggrtp:main`. That channel is registered by the plugin
#   in code; you do not create it manually here.
# - `network.current-server` must match the server id used on Velocity for this
#   backend, for example `survival-1` or `survival-2`.

gui:
  title: "&8Random Teleport"
  size: 27
  filler:
    enabled: true
    material: BLACK_STAINED_GLASS_PANE
    name: " "

main-menu:
  overworld:
    slot: 11
    display-name: "&aOverworld"
    material: GRASS_BLOCK
    world-name: world
    permission: "mcggrtp.dimension.overworld"
    warmup-seconds: 5
    lore:
      - "&7Click to choose an overworld server."
  nether:
    slot: 13
    display-name: "&cNether"
    material: NETHERRACK
    world-name: world_nether
    permission: "mcggrtp.dimension.nether"
    warmup-seconds: 5
    lore:
      - "&7Click to choose a nether server."
      - "&cDangerous dimension."
  end:
    slot: 15
    display-name: "&dThe End"
    material: END_STONE
    world-name: world_the_end
    permission: "mcggrtp.dimension.end"
    warmup-seconds: 5
    lore:
      - "&7Click to choose an end server."

server-menu:
  title: "&8Choose Server: {dimension}"
  size: 27
  online-material: LIME_WOOL
  offline-material: BARRIER

sounds:
  menu-open: BLOCK_NOTE_BLOCK_PLING
  menu-click: BLOCK_NOTE_BLOCK_PLING
  denied: ENTITY_VILLAGER_NO
  teleport-success: ENTITY_ENDERMAN_TELEPORT

network:
  # Must match the server name configured on Velocity for this backend.
  current-server: "survival-1"
  server-permission-prefix: "mcggrtp.server."
  dimensions:
    overworld:
      servers: [ "survival-1", "survival-2", "survival-3" ]
    nether:
      servers: [ "survival-1", "survival-2" ]
    end:
      servers: [ "survival-1" ]
  servers:
    survival-1:
      display-name: "&aSurvival 1"
    survival-2:
      display-name: "&aSurvival 2"
    survival-3:
      display-name: "&aSurvival 3"
  # If a server entry omits `permission`, McggRTP derives it as:
  # `<server-permission-prefix><server-id>`
  # Example: with `server-permission-prefix: "mcgg.server."`,
  # `skyblock321` becomes `mcgg.server.skyblock321`

rtp:
  cooldown-seconds: 300
  worlds:
    world:
      enabled: true
      center-x: 0
      center-z: 0
      min-radius: 500
      max-radius: 5000
      max-attempts: 32
      blacklisted-biomes:
        - OCEAN
        - DEEP_OCEAN
      unsafe-blocks:
        - LAVA
        - FIRE
        - CACTUS
        - MAGMA_BLOCK
    world_nether:
      enabled: true
      center-x: 0
      center-z: 0
      min-radius: 250
      max-radius: 3000
      max-attempts: 64
      avoid-bedrock-roof: true
      unsafe-blocks:
        - LAVA
        - FIRE
        - MAGMA_BLOCK
    world_the_end:
      enabled: true
      center-x: 0
      center-z: 0
      min-radius: 500
      max-radius: 5000
      max-attempts: 48
