name: McggRTP-Paper
version: '1.0.0-test'
main: me.mcgg.azreyzaako.mcggrtp.paper.McggRTPPaper
api-version: '1.21'
author: azreyzaako
commands:
  rtp:
    description: Open the McggRTP menu.
    usage: /rtp
    permission: rtp.use
permissions:
  rtp.use:
    default: true
  rtp.dimension.overworld:
    default: true
  rtp.dimension.nether:
    default: true
  rtp.dimension.end:
    default: true
  rtp.server.survival1:
    default: true
  rtp.server.survival2:
    default: true
  rtp.server.survival3:
    default: true
  rtp.bypass.cooldown:
    default: op
  rtp.admin.reload:
    default: op
