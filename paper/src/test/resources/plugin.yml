name: McggRTP-Paper
version: '1.0.0-test'
main: me.mcgg.azreyzaako.mcggrtp.paper.McggRTPPaper
api-version: '1.21'
author: azreyzaako
commands:
  rtp:
    description: Open the McggRTP menu.
    usage: /rtp
    permission: mcggrtp.use
permissions:
  mcggrtp.use:
    default: true
  mcggrtp.dimension.overworld:
    default: true
  mcggrtp.dimension.nether:
    default: true
  mcggrtp.dimension.end:
    default: true
  mcggrtp.bypass.cooldown:
    default: op
  mcggrtp.admin.reload:
    default: op
